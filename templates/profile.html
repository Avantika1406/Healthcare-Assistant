<form method="POST">
  {% csrf_token %}
  <input name="full_name" value="{{ profile.full_name }}" placeholder="Full Name">
  <input name="age" value="{{ profile.age }}" placeholder="Age">
  <input name="gender" value="{{ profile.gender }}" placeholder="Gender">
  <select name="language">
    <option selected>{{ profile.language }}</option>
    <option>English</option>
    <option>Hindi</option>
  </select>
  <button type="submit">Save</button>
</form>

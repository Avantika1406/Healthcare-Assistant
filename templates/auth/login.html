<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f6f9f7;
font-family:Arial, sans-serif;
}

/* Card */
.card{
width:360px;
padding:36px;
background:white;
border-radius:20px;
box-shadow:0 12px 32px rgba(0,0,0,0.08);
text-align:center;
animation:fadeIn .4s ease;
}

/* Icon */
.icon{
font-size:40px;
margin-bottom:8px;
color:#6e9b85;
}

/* Title */
h2{
color:#6e9b85;
margin-bottom:24px;
}

/* Inputs */
input{
width:100%;
padding:13px;
margin-top:14px;
border-radius:12px;
border:1px solid #d7e0da;
background:#f7faf9;
font-size:14px;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#9db8a0;
box-shadow:0 0 0 2px rgba(157,184,160,0.2);
background:white;
}

/* Button */
button{
width:100%;
margin-top:22px;
padding:13px;
border:none;
border-radius:14px;
background:#9db8a0;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#6e9b85;
transform:translateY(-1px);
}

/* Signup link */
.link{
margin-top:18px;
font-size:14px;
}

a{
color:#6e9b85;
text-decoration:none;
font-weight:600;
}

/* Error */
.error{
color:#e74c3c;
font-size:13px;
margin-top:10px;
}

/* Animation */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<form method="post" class="card">

{% csrf_token %}

<div class="icon">🩺</div>

<h2>Login</h2>

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

<div class="link">
New user? <a href="/signup/">Signup</a>
</div>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f6f9f7;
    font-family:Arial, sans-serif;
}

.card{
    width:360px;
    padding:32px;
    background:white;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    color:#6e9b85;
    margin-bottom:18px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
    border:1px solid #d7e0da;
    background:#f7faf9;
}

input:focus{
    outline:none;
    border-color:#9db8a0;
    box-shadow:0 0 0 2px rgba(157,184,160,0.2);
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:14px;
    background:#9db8a0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#6e9b85;
}

.link{
    text-align:center;
    margin-top:14px;
}

a{
    color:#6e9b85;
    font-weight:bold;
    text-decoration:none;
}

</style>


</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirm_password" placeholder="Confirm Password" required>

<input type="number" name="age" placeholder="Age">

<select name="gender">
<option>Male</option>
<option selected>Female</option>
<option>Other</option>
</select>

<input type="text" name="language" placeholder="Preferred Language">

<button type="submit">Create Account</button>

</form>

<div class="login-link">
Already have account? <a href="/login/">Login</a>
</div>

</div>

</body>
</html>

async function sendDietChat() {

  if (isBotTyping) return;

  const input = document.getElementById("dietInput");
  const chatBox = document.getElementById("dietChat");

  const msg = input.value.trim();
  if (!msg) return;

  // ✅ USER MESSAGE
  chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  const greetings = ["hi","hello","hey","hii"];

  // ✅ GREETING RESPONSE (NO API)
  if (greetings.includes(msg.toLowerCase())) {
    chatBox.innerHTML += `
      <div class="msg ai">
        Hello! 👋 I can help create healthy meal plans.<br><br>
        Tell me your goal — weight loss, muscle gain, or general health?
      </div>
    `;
    chatBox.scrollTop = chatBox.scrollHeight;
    return;
  }

  // 🔒 LOCK
  lockSend();

  // ⏳ TYPING
  const typing = document.createElement("div");
  typing.className = "msg ai typing";
  typing.innerHTML = "<span></span><span></span><span></span>";
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {

    const res = await fetch("/diet-chat/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();   // ⭐ IMPORTANT
    typing.remove();

    // ✅ IF NORMAL TEXT RESPONSE
    if (!data.breakfast || !data.lunch) {
      chatBox.innerHTML += `
        <div class="msg ai">
          ${data.reply.replace(/\n/g,"<br>")}
        </div>
      `;
    } 
    else {
      // ✅ FORMATTED DIET PLAN UI
      const formatted = formatDietResponse(data.reply || "");

      chatBox.innerHTML += `
        <div class="msg ai">
          ${formatted}
        </div>
      `;
    }

    unlockSend();

  } catch (error) {

    typing.remove();
    unlockSend();

    chatBox.innerHTML += `
      <div class="msg ai">
        I can help with diet planning 🤍
      </div>
    `;
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}

      async function loadWeeklyScore() {
        const res = await fetch("/health-score/weekly/");
        const data = await res.json();
        const canvas = document.getElementById("scoreChart");
        const ctx = canvas.getContext("2d");

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const max = 100;
        const stepX = canvas.width / (data.length - 1);

        ctx.beginPath();
        ctx.strokeStyle = "#9db8a0";
        ctx.lineWidth = 2;

        data.forEach((d, i) => {
          const x = i * stepX;
          const y = canvas.height - (d.score / max) * canvas.height;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });

        ctx.stroke();
      }

      async function loadHealthScore() {

    let bmi = parseFloat(localStorage.getItem("bmiValue"));

if (!bmi || isNaN(bmi)) {

}

    else if (bmi >= 25 && bmi <= 29.9) bmiScore = 20;
    else bmiScore = 10;

    const mentalScore = 20;
    const dietScore = 15;
    const consistencyScore = 15;

    const total = bmiScore + mentalScore + dietScore + consistencyScore;

    document.getElementById("ringScore").innerText = total;

   document.getElementById("bmiScore").innerText = bmiScore + "/30";
document.getElementById("mentalScore").innerText = mentalScore + "/20";
document.getElementById("dietScore").innerText = dietScore + "/15";
document.getElementById("consistencyScore").innerText = consistencyScore + "/15";

localStorage.setItem("bmiValue", bmi);

    document.getElementById("scoreStatus").innerText =
        total >= 75 ? "Doing great 🌿" :
        total >= 50 ? "Needs balance ⚖️" :
        "Needs care 🤍";

    animateScoreRing(total);
}

      function animateScoreRing(score) {
        const circle = document.querySelector(".progress");
        const ringText = document.getElementById("ringScore");
        if (!circle || !ringText) return;

        const radius = 60;
        const circumference = 2 * Math.PI * radius;

        circle.style.strokeDasharray = circumference;
        circle.style.strokeDashoffset = circumference;

        const offset = circumference - (score / 100) * circumference;

        setTimeout(() => {
          circle.style.strokeDashoffset = offset;
          ringText.innerText = score;
        }, 100);
      }

function calculateBMI() {

    const weight = parseFloat(document.getElementById("weight").value);
    const height = parseFloat(document.getElementById("height").value);

    if (!weight || !height) {
        return;
    }

    const heightMeters = height / 100;
    const bmi = weight / (heightMeters * heightMeters);

    let status = "";
    let advice = "";

    if (bmi < 18.5) {
        status = "Underweight";
        advice = "You may need to increase your calorie intake and maintain a balanced diet.";
    }
    else if (bmi < 24.9) {
        status = "Normal";
        advice = "Great! Your BMI is in a healthy range. Keep maintaining your lifestyle 🌿";
    }
    else if (bmi < 29.9) {
        status = "Overweight";
        advice = "Consider regular exercise and a balanced diet to maintain a healthy weight.";

function formatDietResponse(text) {

  const icons = {
    "Breakfast": "🍳",
    "Lunch": "🍛",
    "Snack": "🍎",
    "Dinner": "🌙"
  };

  const sections = text.split(/\n(?=[A-Za-z]+:)/); // split by headings

  let html = `<div class="diet-plan">`;

  sections.forEach(section => {

    const lines = section.split("\n").filter(l => l.trim() !== "");

    const title = lines[0].replace(":", "").trim();
    const items = lines.slice(1);

    html += `
      <div class="diet-card-item">
        <h4>${icons[title] || "🥗"} ${title}</h4>
        <ul>
          ${items.map(i => `<li>${i.replace("-","").trim()}</li>`).join("")}
        </ul>
      </div>
    `;
  });

  html += `</div>`;

  return html;
}
